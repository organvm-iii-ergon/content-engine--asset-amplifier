services:
  - type: web
    name: cronus-api
    runtime: node
    region: ohio
    plan: free
    buildCommand: pnpm install && npx tsc -p apps/api/tsconfig.json
    startCommand: node --loader tsx apps/api/src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_MODE
        value: filesystem
      - key: STORAGE_PATH
        value: /tmp/cronus-assets
      - key: API_PORT
        value: "10000"
      - key: API_HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: info
      - key: API_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
